name: CI

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.12'
  IMAGE_NAME: weather-app
  AWS_REGION: eu-west-1

jobs:

  # ── Quality Gates (parallel) ────────────────────────────────────
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      - name: Install quality tools
        run: |
          pip install black==24.2.0 flake8

      - name: Format check (black)
        run: black --check app/ tests/

      - name: Lint (flake8)
        run: flake8 app/ tests/ --max-line-length=100 --exclude=__pycache__
        
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        
      - name: Terraform Init
        run: terraform -chdir=terraform init -backend=false
        
      - name: Terraform format check
        run: terraform -chdir=terraform fmt -check -recursive

      - name: Terraform validate
        run: terraform -chdir=terraform validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        
      - name: Run TFLint
        continue-on-error: true
        working-directory: terraform
        run: tflint --recursive  

      - name: Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          ignore: DL3008
          failure-threshold: warning

  # ── Security Scanning (parallel) ───────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: pip install bandit safety

      - name: SAST scan (bandit)
        run: bandit -r app/ -ll -x tests/
        continue-on-error: true   # warn, don't fail on medium issues

      - name: Dependency vulnerability check (safety)
        run: safety check -r app/requirements.txt
        continue-on-error: true   # warn for now

      - name: Scan Terraform with Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          soft_fail: true

  # ── Unit Tests (parallel) ───────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      
      - name: Run unit tests
        run: |
          python -m pytest tests/unit/ -v -s

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ── Integration Tests (parallel) ────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: weatherapp
          MYSQL_USER: appuser
          MYSQL_PASSWORD: apppass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
          --health-start-period=30s

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run migrations
        env:
          MYSQL_PWD: rootpass
        run: |
          mysql -h 127.0.0.1 -u root weatherapp < migrations/001_init.sql

      - name: Run integration tests
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: appuser
          DB_PASSWORD: apppass
          DB_NAME: weatherapp
          WEATHER_API_KEY: test-key
        run: | 
          python -m pytest tests/integration/ -v

# ── Docker Build Verification ─────────────────────────────────────

  build:
    name: Verify Docker Build

    runs-on: ubuntu-latest

    needs:
      - quality
      - unit-tests
      - integration-tests

    steps:

      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: weather-app:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Repository (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'
